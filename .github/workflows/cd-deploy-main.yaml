name: CD deploy main

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy-main:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    # Upstream-only: dispatches deploy event to twentyhq/twenty-infra (forks use Railway via build-and-push.yml instead)
    if: github.repository_owner == 'twentyhq'
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.TWENTY_INFRA_TOKEN }}
          repository: twentyhq/twenty-infra
          event-type: auto-deploy-main
          client-payload: '{"github": ${{ toJson(github) }}}' # Passes the entire github context to the downstream workflow

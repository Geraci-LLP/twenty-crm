name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geraci-llp/twenty-crm

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # timeout-minutes covers both the setup and its post-step cleanup,
      # which has been observed to hang indefinitely on some runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://crm.geracillp.com

  build-railway:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # timeout-minutes covers both the setup and its post-step cleanup,
      # which has been observed to hang indefinitely on some runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build and push Railway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:railway
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-railway-deploy:
    needs: build-railway
    runs-on: ubuntu-latest
    # Triggers a Railway redeploy after the new ghcr.io image is pushed, so
    # the Railway service auto-pulls the latest :railway tag.
    #
    # Setup needed once on the repo (under Settings → Secrets → Actions):
    #   RAILWAY_TOKEN       — Railway → Account → Tokens → Create Token
    #                         (project-scoped to twenty-crm is safest)
    #   RAILWAY_SERVICE_ID  — the twenty-crm service's UUID
    #                         (in the service URL, or `railway service`)
    #
    # Step is a safe no-op if either secret is unset, so the workflow won't
    # break unaffiliated forks.
    if: github.repository_owner == 'Geraci-LLP'
    steps:
      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "RAILWAY_TOKEN or RAILWAY_SERVICE_ID not set — skipping."
            echo "Add both in GitHub Settings → Secrets and variables → Actions."
            exit 0
          fi
          npm install -g @railway/cli@latest
          railway redeploy --service "$RAILWAY_SERVICE_ID" --yes
          echo "Railway redeploy triggered for ${{ github.sha }}"

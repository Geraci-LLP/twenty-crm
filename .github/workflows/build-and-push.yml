name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geraci-llp/twenty-crm

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # timeout-minutes covers both the setup and its post-step cleanup,
      # which has been observed to hang indefinitely on some runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://crm.geracillp.com

  build-railway:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # timeout-minutes covers both the setup and its post-step cleanup,
      # which has been observed to hang indefinitely on some runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build and push Railway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:railway
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-railway-deploy:
    needs: build-railway
    runs-on: ubuntu-latest
    # No-op if RAILWAY_DEPLOY_WEBHOOK secret isn't set, so this won't fail the
    # workflow on repos that don't use Railway. Set the secret in
    # Settings → Secrets → Actions to a webhook URL from
    # Railway → service → Settings → Webhooks.
    if: ${{ vars.RAILWAY_DEPLOY_WEBHOOK_ENABLED == 'true' || github.repository_owner == 'Geraci-LLP' }}
    steps:
      - name: Trigger Railway redeploy
        env:
          WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "RAILWAY_DEPLOY_WEBHOOK secret not set — skipping. Add it in Settings → Secrets → Actions."
            exit 0
          fi
          curl -fsSL -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions","sha":"${{ github.sha }}"}'
          echo "Railway redeploy triggered for ${{ github.sha }}"
